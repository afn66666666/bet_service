syntax = "proto3";

package user_service;


message User {
    string password = 1;
    string email = 2;
}

message LoginRequest{
    User user = 1;
}

message LoginResponse{
    string token = 1;
    int64 user_id = 2;
}

service UserService{
rpc Login (LoginRequest)
    returns (LoginResponse);
}
